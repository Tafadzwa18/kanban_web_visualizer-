<div class="list-group-item card-kanban shadow-sm mb-2 rounded border-start border-4 border-{{ color }}">
    <div class="d-flex justify-content-between align-items-start">
        <h6 class="mb-1 fw-bold">{{ task.title }}</h6>
        <div class="btn-group">
            <button class="btn btn-sm text-primary p-0 me-2" data-bs-toggle="modal" data-bs-target="#editModal{{ task.id }}">
                Edit
            </button>
            <form method="POST" style="display:inline;">
                {% csrf_token %}
                <input type="hidden" name="action" value="delete">
                <input type="hidden" name="task_id" value="{{ task.id }}">
                <button type="submit" class="btn btn-sm text-danger p-0" onclick="return confirm('Delete this task?')">
                    Del
                </button>
            </form>
        </div>
    </div>
    <p class="mb-1 small text-muted">{{ task.description|truncatewords:10 }}</p>
    <div class="mt-2">
        <span class="badge bg-light text-dark border small">
            <i class="bi bi-person"></i> {{ task.assigned_to.name|default:"Unassigned" }}
        </span>
    </div>
</div>

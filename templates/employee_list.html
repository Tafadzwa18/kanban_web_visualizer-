<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
   <div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Team Members</h2>
        <a href="{% url 'kanban' %}" class="btn btn-outline-secondary btn-sm">Back to Board</a>
    </div>
    
    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Name</th>
                        <th>Role</th>
                        <th>Email</th>
                        <th class="text-center">Active Tasks</th>
                        <th class="text-center">Success Rate</th>
                    </tr>
                </thead>
                <tbody>
                    {% for employee in employees %}
                    <tr>
                        <td class="fw-bold">{{ employee.name }}</td>
                        <td><span class="badge bg-info text-dark">{{ employee.role }}</span></td>
                        <td>{{ employee.email }}</td>
                        <td class="text-center">
                            <span class="badge {% if employee.active_tasks_count > 3 %}bg-danger{% else %}bg-primary{% endif %} rounded-pill">
                                {{ employee.active_tasks_count }}
                            </span>
                        </td>
                        <td class="text-center text-muted small">
                            {{ employee.completed_tasks_count }} finished
                        </td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="5" class="text-center py-4 text-muted">No employees found.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
